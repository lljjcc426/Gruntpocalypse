# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Grunt CI

on:
  push:
    branches: [ "main", "LiJiachen" ]
  pull_request:
    branches: [ "main", "LiJiachen" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test with Gradle
        run: ./gradlew test :grunt-main:distJar :grunt-back:bootJar --no-daemon --no-configuration-cache

      - name: Upload grunt-main artifact
        uses: actions/upload-artifact@v4
        with:
          name: grunt-main-all
          path: grunt-main/build/libs/grunt-main-all.jar
          if-no-files-found: error

      - name: Upload grunt-back artifact
        uses: actions/upload-artifact@v4
        with:
          name: grunt-back
          path: grunt-back/build/libs/grunt-back.jar
          if-no-files-found: error

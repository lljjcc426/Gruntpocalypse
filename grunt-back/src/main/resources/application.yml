server:
  port: 8082

spring:
  application:
    name: grunt-back
  main:
    banner-mode: console
  codec:
    max-in-memory-size: 32MB
  r2dbc:
    url: r2dbc:h2:mem:///grunteon-control
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
  data:
    redis:
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false
    redis:
      enabled: false

info:
  app:
    name: Grunt Back
    stack: Spring Boot WebFlux + Security + R2DBC + Redis + Kafka + MinIO + Temporal + OpenTelemetry

grunteon:
  back:
    runtime:
      mode: control
    auth:
      users:
        - username: user
          password: grunteon-user
          roles:
            - USER
        - username: platform-admin
          password: grunteon-platform-admin
          roles:
            - PLATFORM_ADMIN
        - username: super-admin
          password: grunteon-super-admin
          roles:
            - SUPER_ADMIN
    policy:
      default-profile: SECURE
      ui-profile: RESEARCH
      control-plane-name: spring-control-plane
      worker-plane-name: local-worker-plane
    worker:
      mode: local
      remote:
        base-url: http://127.0.0.1:${server.port}
        shared-secret:
    integration:
      temporal-enabled: false
      kafka-enabled: false
      redis-enabled: false
      minio-enabled: false
      otel-enabled: false
      download-grant-ttl-seconds: 120
    storage:
      session-base-dir: .state/web
      object-base-dir: .state/object-store
